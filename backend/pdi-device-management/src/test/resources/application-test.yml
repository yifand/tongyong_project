spring:
  application:
    name: pdi-device-management-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # 禁用安全
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

  # 禁用SQL初始化
  sql:
    init:
      mode: never

# 设备管理配置
pdi:
  device:
    heartbeat-timeout: 60
    enable-auto-offline: true
    metrics-history-days: 7

logging:
  level:
    com.vdc.pdi.device: DEBUG
    org.hibernate.SQL: DEBUG
