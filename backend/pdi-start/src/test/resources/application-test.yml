# ============================================================
# PDI智能监测平台 - 测试环境配置
# ============================================================

spring:
  application:
    name: pdi-monitor-platform-test

  # ============================================================
  # 测试环境数据源 (H2内存数据库)
  # ============================================================
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  # ============================================================
  # JPA配置 - 测试环境自动创建表结构
  # ============================================================
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # ============================================================
  # SQL初始化 - 测试环境执行初始数据
  # ============================================================
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql,classpath:sql/smoke-test-data.sql

  # ============================================================
  # 禁用H2控制台
  # ============================================================
  h2:
    console:
      enabled: false

# ============================================================
# JWT配置 - 测试环境使用固定密钥
# ============================================================
jwt:
  secret: test-secret-key-must-be-at-least-32-characters-long-for-testing
  access-token-expiration: 3600000      # 1小时
  refresh-token-expiration: 86400000    # 1天

# ============================================================
# 日志配置 - 测试环境WARN级别
# ============================================================
logging:
  level:
    root: WARN
    com.vdc.pdi: INFO
    org.springframework.test: INFO

# ============================================================
# CORS配置 - 测试环境
# ============================================================
pdi:
  cors:
    allowed-origins: "*"
    allow-credentials: false
