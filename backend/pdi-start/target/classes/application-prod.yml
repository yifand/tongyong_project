# ============================================================
# PDI智能监测平台 - 生产环境配置
# ============================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  # ============================================================
  # 生产环境数据源 (PostgreSQL)
  # ============================================================
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PDI-HikariPool-Prod
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

  # ============================================================
  # JPA配置 - 生产环境仅验证表结构
  # ============================================================
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 100

  # ============================================================
  # SQL初始化 - 生产环境不执行
  # ============================================================
  sql:
    init:
      mode: never

# ============================================================
# JWT配置 - 生产环境必须使用环境变量配置密钥
# ============================================================
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 7200000      # 2小时
  refresh-token-expiration: 604800000   # 7天

# ============================================================
# 日志配置 - 生产环境INFO级别，输出到文件
# ============================================================
logging:
  level:
    root: WARN
    com.vdc.pdi: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:/var/log/pdi/application.log}
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 10GB

# ============================================================
# Actuator配置 - 生产环境限制端点暴露
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

# ============================================================
# CORS配置 - 生产环境必须配置具体的来源
# ============================================================
pdi:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://your-domain.com}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: Authorization,Content-Type,X-Requested-With,Accept,Origin
    allow-credentials: true
    max-age: 3600
