version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: vdc-postgres-test
    environment:
      POSTGRES_DB: vdc_platform
      POSTGRES_USER: vdc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vdc}
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vdc -d vdc_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: vdc-redis-test
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: vdc-minio-test
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vdcadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-vdcadmin123}
    ports:
      - "127.0.0.1:9001:9000"
      - "127.0.0.1:9002:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
