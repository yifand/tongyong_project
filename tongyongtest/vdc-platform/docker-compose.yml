services:
  nginx:
    image: nginx:1.24-alpine
    container_name: vdc-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../vdc-frontend/dist:/usr/share/nginx/html:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - vdc-network
    depends_on:
      - app

  app:
    image: vdc-platform:latest
    container_name: vdc-app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vdc_platform
      - DB_USER=vdc
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
    networks:
      - vdc-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: vdc-postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_DB=vdc_platform
      - POSTGRES_USER=vdc
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
    networks:
      - vdc-network

  redis:
    image: redis:7-alpine
    container_name: vdc-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - vdc-network

  minio:
    image: minio/minio:latest
    container_name: vdc-minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    networks:
      - vdc-network

volumes:
  pg_data:
  redis_data:
  minio_data:

networks:
  vdc-network:
    driver: bridge
