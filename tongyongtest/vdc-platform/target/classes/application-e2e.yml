spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/vdc_platform
    username: ${DB_USER:vdc}
    password: ${DB_PASSWORD:vdc}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9001}
  access-key: ${MINIO_ACCESS_KEY:vdcadmin}
  secret-key: ${MINIO_SECRET_KEY:vdcadmin123}
  bucket-name: vdc-bucket

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.vdc.platform: debug
    org.springframework.web: debug

vdc:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 300000
    refresh-token-expiration: 600000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: always
